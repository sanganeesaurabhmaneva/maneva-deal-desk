# Optional one-click blueprint. You can also just create a Web Service in the
# Render dashboard, set Root Directory to "backend", and it will detect the Dockerfile.
services:
  - type: web
    name: maneva-deal-desk-api
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    plan: starter
    envVars:
      - key: PORT
        value: "8080"
      - key: PYTHON_BIN
        value: python3
      # Set these in the Render dashboard (do not commit secrets):
      #   API_TOKEN, CORS_ORIGIN, and your Salesforce credentials.
